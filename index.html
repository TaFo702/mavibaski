<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mavi Basım | Türkiye Geneli Matbaa Hizmetleri</title>
    
    <link rel="icon" type="image/png" href="./mavilogo.png" />
    <link rel="apple-touch-icon" href="./mavilogo.png" />

    <link rel="stylesheet" href="./index-LHtcwGgP.css">

    <style>
      /* Logoyu ve hatalı resim yazılarını kesin olarak gizler */
      img[alt*="Mavi Basım Logo"], 
      img[src*="mavilogo"],
      .navbar-brand img, 
      .logo img { 
        display: none !important; 
        opacity: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index-BPhsPaah.js"></script>

    <script>
      // Bannerları yeni b1, b2... isimlerine göre hızlıca sıraya sokar
      function fixBannerOrder() {
        const allImages = document.querySelectorAll('img');
        const bannerOrder = ["b1.jpg", "b2.jpg", "b3.jpg", "b4.jpg", "b5.jpg"];
        
        let bannerCount = 0;
        allImages.forEach(img => {
          // Eğer resim bir banner alanındaysa veya src'sinde banner/b rakam geçiyorsa
          if (img.src.includes('banner') || img.src.includes('/b')) {
            if (bannerOrder[bannerCount]) {
              // Eski resmi göstermeden hemen yenisiyle değiştirir
              img.src = './' + bannerOrder[bannerCount];
              bannerCount++;
            }
          }
        });
      }

      // Sayfa yüklenir yüklenmez ve React render ettikçe çalıştır
      window.addEventListener('load', fixBannerOrder);
      
      // 2 saniyelik eski görüntü gelmesin diye sürekli (agresif) kontrol
      const bannerInterval = setInterval(fixBannerOrder, 100); 
      
      // 5 saniye sonra sürekli kontrolü durdur (performans için)
      setTimeout(() => clearInterval(bannerInterval), 5000);
    </script>
  </body>
</html>

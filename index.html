<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mavi Basım | Türkiye Geneli Matbaa Hizmetleri</title>
    
    <link rel="icon" type="image/png" href="./mavilogo.png" />
    <link rel="apple-touch-icon" href="./mavilogo.png" />

    <link rel="stylesheet" href="./index-LHtcwGgP.css">

    <style>
      /* Logoyu ve hatalı resim yazılarını kesin olarak gizler */
      img[alt*="Mavi Basım Logo"], 
      img[src*="mavilogo"],
      .navbar-brand img, 
      .logo img { 
        display: none !important; 
        width: 0 !important;
        height: 0 !important;
        opacity: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index-BPhsPaah.js"></script>

    <script>
      function fixBannerOrder() {
        // Sadece banner resimlerini veya eski banner adlarını içeren resimleri hedefle
        const bannerImages = document.querySelectorAll('img[src*="banner"], img[src*="/b1"], img[src*="/b2"], img[src*="/b3"], img[src*="/b4"], img[src*="/b5"]');
        const desiredOrder = ["b1.jpg", "b2.jpg", "b3.jpg", "b4.jpg", "b5.jpg"];
        
        let bannerCount = 0;
        bannerImages.forEach((img) => {
          // Eğer resim henüz değiştirilmemişse ve listede sıradaki resim varsa
          if (desiredOrder[bannerCount] && !img.dataset.fixed) {
             const newSrc = './' + desiredOrder[bannerCount];
             if (img.src !== newSrc) {
                img.src = newSrc;
                // Bu resmin değiştirildiğini işaretle (sonsuz döngüyü önler)
                img.dataset.fixed = 'true';
             }
             bannerCount++;
          }
        });
      }

      // Sayfa yüklenince çalıştır
      window.addEventListener('load', fixBannerOrder);
      
      // React'in dinamik yüklemelerini yakalamak için daha seyrek kontrol
      const bannerInterval = setInterval(fixBannerOrder, 1000); 
      
      // 10 saniye sonra sürekli kontrolü durdur (performans için)
      setTimeout(() => clearInterval(bannerInterval), 10000);
    </script>
  </body>
</html>

<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mavi Basım | Türkiye Geneli Matbaa Hizmetleri</title>
    
    <link rel="icon" type="image/png" href="./mavilogo.png" />
    <link rel="apple-touch-icon" href="./mavilogo.png" />
    <link rel="stylesheet" href="./index-LHtcwGgP.css">

    <style>
      /* Logoyu ve hatalı resim yazılarını her zaman gizli tutar */
      img[alt*="Mavi Basım Logo"], img[src*="mavilogo"], .navbar-brand img, .logo img { 
        display: none !important; 
        opacity: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index-BPhsPaah.js"></script>

    <script>
      // Bu fonksiyon tarayıcı hafızasını atlayıp direkt senin yüklediğin dosyaları dayatır
      function forceBanners() {
        const images = document.querySelectorAll('img');
        // Senin kesin listen (GitHub root dizinindeki isimler)
        const myFiles = ["b1.jpg", "b2.jpg", "b3.jpg", "b4.jpg", "b5.jpg"];
        
        let foundIdx = 0;
        images.forEach((img) => {
          // Eğer resim bir slider içindeyse veya src'sinde "banner/b" geçiyorsa
          if (img.src.includes('banner') || img.src.includes('/b') || img.closest('.swiper-slide') || img.closest('.slick-slide')) {
            if (myFiles[foundIdx]) {
              // ?v=99 ekleyerek tarayıcının eski hafızasını (cache) tamamen çöpe atıyoruz
              const freshSrc = './' + myFiles[foundIdx] + '?v=99';
              if (img.src !== freshSrc) {
                img.src = freshSrc;
              }
              foundIdx++;
            }
          }
        });
      }

      // Sayfa yüklenince ve React her render ettiğinde (sık aralıkla) kontrol et
      window.addEventListener('load', forceBanners);
      const safetyNet = setInterval(forceBanners, 500);
      
      // 10 saniye sonra durdur (sayfa oturduğunda)
      setTimeout(() => clearInterval(safetyNet), 10000);
    </script>
  </body>
</html>

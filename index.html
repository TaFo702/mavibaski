<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mavi Basım | Türkiye Geneli Matbaa Hizmetleri</title>
    
    <link rel="icon" type="image/png" href="./mavilogo.png" />
    <link rel="apple-touch-icon" href="./mavilogo.png" />

    <link rel="stylesheet" href="./index-LHtcwGgP.css">

    <style>
      /* 1. Logoyu ve kırık resim yazısını her yerden siler */
      img[alt*="Mavi Basım Logo"], 
      img[src*="mavilogo"],
      .navbar-brand img, 
      .logo img { 
        display: none !important; 
        width: 0 !important;
        height: 0 !important;
        opacity: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index-BPhsPaah.js"></script>

    <script>
      // 2. Banner Sıralamasını banner1.jpg ile başlatmak için zorlayıcı script
      function fixBannerOrder() {
        const allImages = document.querySelectorAll('img');
        const bannerOrder = ["banner1.jpg", "banner2.jpg", "banner3.jpg", "banner4.jpg", "banner5.jpg"];
        
        let foundBanners = [];
        allImages.forEach(img => {
          if (img.src.includes('banner')) {
            foundBanners.push(img);
          }
        });

        // Bulunan banner slotlarına sırasıyla resimleri ata
        foundBanners.forEach((img, i) => {
          if (bannerOrder[i]) {
            img.src = './' + bannerOrder[i];
          }
        });
      }

      // Sayfa yüklendiğinde ve her 1 saniyede bir (React render sonrası için) kontrol et
      window.addEventListener('load', fixBannerOrder);
      setTimeout(fixBannerOrder, 1000);
      setTimeout(fixBannerOrder, 3000);
    </script>
  </body>
</html>

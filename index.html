<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mavi Basım | Türkiye Geneli Matbaa Hizmetleri</title>
    
    <link rel="icon" type="image/png" href="./mavilogo.png" />
    <link rel="apple-touch-icon" href="./mavilogo.png" />

    <link rel="stylesheet" href="./index-LHtcwGgP.css">

    <style>
      /* Kırık logo yazısını ve hatalı alanları kesin olarak gizler */
      img[alt*="Mavi Basım"], 
      img[src*="mavilogo.png"]:not([src]) { 
        display: none !important; 
        opacity: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="./index-BPhsPaah.js"></script>

    <script>
      // Banner sıralaması karışıksa, tarayıcıya senin istediğin sırayı dayatır
      window.addEventListener('load', function() {
        const banners = document.querySelectorAll('img[src*="banner"]');
        const order = ["banner1.jpg", "banner2.jpg", "banner3.jpg", "banner4.jpg", "banner5.jpg"];
        banners.forEach((img, i) => {
          if(order[i]) img.src = './' + order[i];
        });
      });
    </script>
  </body>
</html>

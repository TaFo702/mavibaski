<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mavi Basım | Türkiye Geneli Matbaa Hizmetleri</title>
    
    <link rel="icon" type="image/png" href="./mavilogo.png" />
    <link rel="apple-touch-icon" href="./mavilogo.png" />

    <link rel="stylesheet" href="./index-LHtcwGgP.css">

    <style>
      /* Logoyu ve hatalı resim yazılarını gizler */
      img[alt*="Mavi Basım Logo"], 
      img[src*="mavilogo"],
      .navbar-brand img, 
      .logo img { 
        display: none !important; 
        opacity: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index-BPhsPaah.js"></script>

    <script>
      function forceBanners() {
        // Sayfadaki tüm resimleri tara
        const images = document.querySelectorAll('img');
        const bannerFiles = ["b1.jpg", "b2.jpg", "b3.jpg", "b4.jpg", "b5.jpg"];
        
        // Önce slider içindeki resimleri hedef alalım
        let bCount = 0;
        images.forEach((img) => {
          // Eğer resim slider'ın içindeyse veya src'sinde eski banner adları geçiyorsa
          if (img.src.includes('banner') || img.src.includes('b1.jpg') || img.src.includes('b2.jpg') || img.closest('.swiper-slide') || img.closest('.slick-slide')) {
             if (bannerFiles[bCount]) {
                const newSrc = './' + bannerFiles[bCount];
                if (img.src !== newSrc) {
                   img.src = newSrc;
                }
                bCount++;
             }
          }
        });
      }

      // React render ettikçe resimleri sürekli güncelle (her 500ms)
      const bannerTimer = setInterval(forceBanners, 500);

      // Sayfa tam yüklenince bir kez daha tetikle
      window.addEventListener('load', forceBanners);
    </script>
  </body>
</html>
